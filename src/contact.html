<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Portfolio</title>
    <link rel="stylesheet" href="styles/contactStyle.css">
</head>
<section id="contact">
    <h2>Contact</h2>
    <p>If you're interested in working together or would like to learn more about my services, feel free to reach out to me using the form below. I look forward to hearing from you!</p>

    <form action="mailto:contact@johndoe.com" method="POST" enctype="text/plain">
        <div>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required placeholder="Enter your name">
        </div>

        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email">
        </div>

        <div>
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required placeholder="Enter your message"></textarea>
        </div>

        <button type="submit">Send Message</button>
    </form>
</section>
</html>
